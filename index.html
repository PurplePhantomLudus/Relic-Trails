<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relic Trails - Lost Cities Companion</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="welcome" class="screen">
        <img src="assets/welcome/welcome.png" class="welcome-img" alt="Relic Trails">
        <h1>Relic Trails</h1>
        <p>Official Score Tracker</p>
        <button id="btnContinue">Iniciar Expedición</button>
    </div>

    <div id="setup" class="screen hidden">
        <h2>Preparar el Viaje</h2>
        <div class="card">
            <input id="player1" type="text" placeholder="Explorador 1" maxlength="12">
            <input id="player2" type="text" placeholder="Explorador 2 (opcional)" maxlength="12">
            <h3>Variante de Expediciones</h3>
            <select id="expeditions">
                <option value="5">Clásico (5 Colores)</option>
                <option value="6">Moderno (6 Colores)</option>
            </select>
            <button id="btnStart">Comenzar Aventura</button>
        </div>
    </div>

    <div id="game" class="screen hidden">
        <header>
            <h2 id="roundTitle">Ronda 1</h2>
            <div id="playerTurn" class="badge">Turno de: Jugador</div>
        </header>
        <div id="board"></div>
        <button id="btnFinishTurn">Calcular Puntuación</button>
    </div>

    <div id="roundResult" class="screen hidden">
        <h2>Resultados de la Ronda</h2>
        <div id="roundScores" class="score-card"></div>
        <button id="btnNextRound">Siguiente Ronda</button>
    </div>

    <div id="finalResult" class="screen hidden">
        <h1>Fin del Camino</h1>
        <div id="finalScores" class="score-card"></div>
        <button id="btnRestart">Nueva Partida</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
