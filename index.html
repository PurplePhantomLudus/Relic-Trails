<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lost Cities Score</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="welcome" class="screen">

<img src="assets/welcome/welcome.jpg" class="welcome">

<h1>Lost Cities Score</h1>

<button onclick="showSetup()">Continuar</button>

</div>

<div id="setup" class="screen hidden">

<h2>Configuración</h2>

<input id="player1" placeholder="Jugador 1">

<input id="player2" placeholder="Jugador 2">

<h3>Expediciones</h3>

<select id="expeditions">
<option value="5">5 expediciones</option>
<option value="6">6 expediciones</option>
</select>

<button onclick="startGame()">Iniciar partida</button>

</div>

<div id="game" class="screen hidden">

<h2 id="roundTitle"></h2>

<div id="playerTurn"></div>

<div id="board"></div>

<button onclick="finishTurn()">Finalizar turno</button>

</div>

<div id="roundResult" class="screen hidden">

<h2>Resultado de la ronda</h2>

<div id="roundScores"></div>

<button onclick="nextRound()">Siguiente ronda</button>

</div>

<div id="finalResult" class="screen hidden">

<h2>Resultado final</h2>

<div id="finalScores"></div>

<button onclick="restart()">Nueva partida</button>

</div>

<script src="app.js"></script>

</body>

</html>
