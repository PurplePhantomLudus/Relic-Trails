<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lost Cities Score</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>
    <!-- Pantalla de Inicio -->
    <div id="pantalla-inicio" class="pantalla activa">
        <header>
            <h1>Lost Cities</h1>
            <p>Contador de Expediciones</p>
        </header>
        <div class="card">
            <div class="grupo-input">
                <label>Jugador 1</label>
                <input type="text" id="nombre-j1" placeholder="Explorador 1" value="Indiana">
            </div>
            <div class="grupo-input">
                <label>Jugador 2</label>
                <input type="text" id="nombre-j2" placeholder="Explorador 2" value="Lara">
            </div>
            <div class="grupo-opciones">
                <p>Expediciones</p>
                <div class="botones-seleccion">
                    <button class="btn-opcion seleccionado" id="btn-5" onclick="setExp(5)">5 Colores</button>
                    <button class="btn-opcion" id="btn-6" onclick="setExp(6)">6 Colores</button>
                </div>
            </div>
            <button class="btn-principal" onclick="iniciarPartida()">Empezar Aventura</button>
        </div>
    </div>

    <!-- Pantalla de Puntuación -->
    <div id="pantalla-puntuacion" class="pantalla">
        <header>
            <h2 id="info-ronda">Ronda 1/3</h2>
            <h3 id="info-turno">Turno de: Jugador</h3>
        </header>
        <div id="contenedor-expediciones"></div>
        <button class="btn-principal" onclick="guardarTurno()">Confirmar Puntos</button>
    </div>

    <!-- Pantalla de Resultados -->
    <div id="pantalla-resultados" class="pantalla">
        <header>
            <h1>Resultados Finales</h1>
            <h2 id="ganador-texto"></h2>
        </header>
        <div id="tabla-resultados" class="card"></div>
        <button class="btn-principal" onclick="location.reload()">Nueva Partida</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
