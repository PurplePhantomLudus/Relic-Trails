<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Relic Trails</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

<script src="app.js" defer></script>

</head>

<body>

<div id="welcome" class="screen">

<img src="assets/welcome/welcome.jpg" class="welcome">

<h1>Relic Trails</h1>

<p>Track your expedition scores and discover the greatest explorer.</p>

<button id="btnContinue">Start Expedition</button>

</div>

<div id="setup" class="screen hidden">

<h2>Prepare the Expedition</h2>

<input id="player1" placeholder="Explorer 1">

<input id="player2" placeholder="Explorer 2 (optional)">

<h3>Number of Expeditions</h3>

<select id="expeditions">
<option value="5">5 Expeditions</option>
<option value="6">6 Expeditions</option>
</select>

<button id="btnStart">Begin Journey</button>

</div>

<div id="game" class="screen hidden">

<h2 id="roundTitle"></h2>

<h3 id="playerTurn"></h3>

<div id="board"></div>

<button id="btnFinishTurn">Calculate Expedition</button>

</div>

<div id="roundResult" class="screen hidden">

<h2>Round Results</h2>

<div id="roundScores"></div>

<button id="btnNextRound">Next Round</button>

</div>

<div id="finalResult" class="screen hidden">

<h2>Final Expedition Results</h2>

<div id="finalScores"></div>

<button id="btnRestart">New Game</button>

</div>

</body>
</html>
