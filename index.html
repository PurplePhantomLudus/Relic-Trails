<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lost Cities Explorer Score</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="pantalla-inicio" class="pantalla activa">
        <header>
            <h1>LOST CITIES</h1>
            <p>Calculadora de Expediciones</p>
        </header>
        <div class="card">
            <div class="grupo-input">
                <label>Explorador 1</label>
                <input type="text" id="nombre-j1" placeholder="Nombre...">
            </div>
            <div class="grupo-input">
                <label>Explorador 2</label>
                <input type="text" id="nombre-j2" placeholder="Nombre...">
            </div>
            <div class="grupo-opciones">
                <p>Variante de Juego</p>
                <div class="botones-seleccion">
                    <button class="btn-opcion seleccionado" id="btn-5" onclick="seleccionarModo(5)">Clásico (5)</button>
                    <button class="btn-opcion" id="btn-6" onclick="seleccionarModo(6)">Moderno (6)</button>
                </div>
            </div>
            <button class="btn-principal" onclick="iniciarPartida()">¡Comenzar Aventura!</button>
        </div>
    </div>

    <div id="pantalla-puntuacion" class="pantalla">
        <header>
            <h2 id="info-ronda">Ronda 1 / 3</h2>
            <h3 id="info-turno">Turno de: Jugador</h3>
        </header>
        <div id="contenedor-expediciones"></div>
        <button class="btn-principal" onclick="guardarTurno()">Finalizar Turno</button>
    </div>

    <div id="pantalla-resultados" class="pantalla">
        <header>
            <h1>Fin del Viaje</h1>
            <h2 id="ganador-texto"></h2>
        </header>
        <div id="tabla-resultados" class="card"></div>
        <button class="btn-principal" onclick="location.reload()">Nueva Partida</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
