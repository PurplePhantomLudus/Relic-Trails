<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relic Trails</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="welcome" class="screen">
        <img src="assets/welcome/portada.png" class="welcome" alt="Relic Trails">
        <h1>Relic Trails</h1>
        <p>Calcula y equilibra tus expediciones como un profesional [3].</p>
        <button id="btnContinue">Iniciar Viaje</button>
    </div>

    <div id="setup" class="screen hidden">
        <h2>Preparar Partida [3]</h2>
        <input id="player1" placeholder="Explorador 1">
        <input id="player2" placeholder="Explorador 2">
        <select id="expeditions">
            <option value="5">5 Expediciones Oficiales</option>
            <option value="6">6 Expediciones (Modo Misterio)</option>
        </select>
        <button id="btnStart">Comenzar</button>
    </div>

    <div id="game" class="screen hidden">
        <h2 id="roundTitle"></h2>
        <p id="playerTurn"></p>
        <div id="board"></div>
        <button id="btnFinishTurn">Calcular Puntuación</button>
    </div>

    <div id="roundResult" class="screen hidden">
        <div id="roundScores" class="result-box"></div>
        <button id="btnNextRound">Siguiente Ronda</button>
    </div>

    <div id="finalResult" class="screen hidden">
        <div id="finalScores"></div>
        <button id="btnRestart">Nueva Expedición</button>
    </div>
</body>
</html>
